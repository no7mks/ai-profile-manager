# This is a GitHub Actions CI example only.
# Primary flow is local other-repo -> ~/.aipm/events -> `aipm ingest`.
name: Generate Capture Event Into Events Dir

on:
  workflow_dispatch:

jobs:
  capture-and-write-events:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Generate CaptureEvent into ~/.aipm/events
        env:
          AIPM_HOME: ${{ github.workspace }}/.aipm
        run: |
          php bin/aipm skill:capture graphify -t cursor \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --event-id "$(cat /proc/sys/kernel/random/uuid)" \
            --captured-at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Show generated event files
        env:
          AIPM_HOME: ${{ github.workspace }}/.aipm
        run: ls -la "${AIPM_HOME}/events"
